<nav class="fixed top-0 left-0 right-0 z-50 bg-[#03131d] border-b border-slate-700/30">
  <div class="container mx-auto px-4 md:px-6">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <div class="flex items-center">
        <img 
          src="/icon_512x512.png" 
          alt="Katrix Logo" 
          class="w-10 h-10 rounded-lg object-contain mr-3"
        />
        <h1 class="text-2xl font-bold tracking-tight gradient-accent bg-clip-text text-transparent font-mono">
          Katrix
        </h1>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden lg:flex items-center space-x-1">
        @for (item of navItems; track item.label) {
          <button
            (click)="scrollToSection(item.href)"
            class="relative px-4 py-2 text-sm font-medium text-pearl-bush/80 hover:text-blue-chill transition-all duration-300 rounded-lg hover:bg-blue-chill/10 group"
          >
            <span class="relative z-10">{{ item.label }}</span>
            <div class="absolute inset-0 bg-gradient-to-r from-blue-chill/20 to-surfie-green/20 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
          </button>
        }
      </div>
      
      <!-- CTA Button -->
      <div class="hidden lg:block">
        <button
          (click)="scrollToSection('#contacto')"
          class="modern-btn-primary group text-sm px-6 py-2.5"
        >
          Comenzar
        </button>
      </div>

      <!-- Mobile menu button -->
      <div class="lg:hidden">
        <button
          (click)="toggleMenu()"
          class="p-2 text-pearl-bush hover:text-blue-chill transition-all duration-300 hover:bg-blue-chill/10 rounded-lg"
        >
          <lucide-icon [name]="isMenuOpen() ? X : Menu" class="w-6 h-6"></lucide-icon>
        </button>
      </div>
    </div>

    <!-- Mobile Navigation -->
    @if (isMenuOpen()) {
      <div class="lg:hidden bg-black-pearl/95 backdrop-blur-xl border-t border-blue-chill/20">
        <div class="px-4 py-4 space-y-2">
          @for (item of navItems; track item.label) {
            <button
              (click)="scrollToSection(item.href)"
              class="block w-full text-left px-4 py-3 text-pearl-bush hover:text-blue-chill transition-all duration-300 rounded-lg hover:bg-blue-chill/10"
            >
              {{ item.label }}
            </button>
          }
          <button
            (click)="scrollToSection('#contacto')"
            class="modern-btn-primary group w-full text-sm px-6 py-3 mt-4"
          >
            Comenzar
          </button>
        </div>
      </div>
    }
  </div>
</nav>
